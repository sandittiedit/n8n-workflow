services:
  - type: web
    name: n8n-automation-server
    env: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: N8N_HOST
        value: 0.0.0.0
      - key: N8N_PORT
        value: 5678
      - key: N8N_PROTOCOL
        value: https
      - key: NODE_ENV
        value: production
      - key: WEBHOOK_URL
        value: https://n8n-automation-server.onrender.com
      - key: GENERIC_TIMEZONE
        value: Asia/Kolkata
